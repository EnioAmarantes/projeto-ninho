version: "3.9"

services:

  ollama:

    build:
      context: ./ai/ollama

    container_name: ollama

    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

    runtime: nvidia

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  api:

    build:
      context: ./platform/orchestrator

    container_name: projetoninho-orchestrator

    depends_on:
      - ollama

    ports:
      - "5011:8080"

    environment:
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: jarvis:latest

  media:

    build:
      context: ./platform/media/ninho_media_server

    container_name: projetoninho-media

    restart: unless-stopped

    ports:
      - "9090:9090"
      - "1935:1935"

    environment:
      MIX_ENV: prod

    volumes:
      - ./platform/media/ninho_media_server/priv/models:/app/priv/models
      - ./platform/media/ninho_media_server/priv/frames:/app/priv/frames
      - ./platform/media/ninho_media_server/priv/static/hls:/app/priv/static/hls

volumes:
  ollama-data: