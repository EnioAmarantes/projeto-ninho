version: "3.9"

services:

  ollama:

    build:
      context: ./ai/ollama

    container_name: ollama

    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

  api:

    build:
      context: ./platform/orchestrator

    container_name: projetoninho-orchestrator

    depends_on:
      - ollama

    ports:
      - "5011:8080"

    environment:
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: jarvis:latest

volumes:
  ollama-data: